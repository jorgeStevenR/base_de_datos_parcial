<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Sistema de Gestión</title>
    <link rel="stylesheet" href="reset.css">
</head>
<body>
    <div class="card">
        <div id="statusMsg">
            <h1>🔑 Restablecer Contraseña</h1>
            <p>Ingresa tu nueva contraseña para <strong id="userEmail"></strong></p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="newPassword" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('newPassword', this)"><img src="/icons/1.png" alt="ver"></button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('confirmPassword', this)"><img src="/icons/1.png" alt="ver"></button>
                </div>
            </div>
            <button type="submit" class="btn" id="resetBtn">Restablecer Contraseña</button>
            <p style="margin-top:16px;font-size:0.85rem;">
                <a href="/login/Login.html">Volver al login</a>
            </p>
        </form>
    </div>

    <script src="../shared/api.js"></script>
    <script src="reset.js"></script>
</body>
</html>
